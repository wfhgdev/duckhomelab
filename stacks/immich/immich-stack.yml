# ============================================================================
# Stack: Immich v2 — Gestión de fotos y vídeos self-hosted (Google Photos)
# Para usar en: Dockge → /opt/stacks/immich/docker-compose.yml
#
# ============================================================================
# REQUISITOS DE HARDWARE (fuente: docs.immich.app/install/requirements)
# ============================================================================
#
#   CPU:
#     - Mínimo    : 2 núcleos (amd64 con microarquitectura >= x86-64-v2,
#                   compatible con la mayoría de CPUs desde ~2012)
#     - Recomendado: 4 núcleos
#
#   RAM:
#     - Mínimo    : 6 GB (requerido para subida de assets y jobs de ML)
#     - Recomendado: 8 GB
#     - Nota: con solo 4 GB puede funcionar deshabilitando machine-learning
#
#   Sistema operativo:
#     - Linux 64-bit (Ubuntu/Debian recomendado)
#     - Filesystem: EXT4, ZFS, BTRFS o XFS (NUNCA NTFS, FAT32 ni NFS/SMB)
#
#   Almacenamiento en disco — desglose por componente:
#   ┌────────────────────────────────────┬───────────────┬─────────────────┐
#   │ Componente                         │ Tipo          │ Tamaño aprox.   │
#   ├────────────────────────────────────┼───────────────┼─────────────────┤
#   │ immich-server (imagen Docker)      │ Descarga      │ ~400 MB         │
#   │ immich-machine-learning (imagen)   │ Descarga      │ ~1.5 GB         │
#   │ valkey/valkey:9 (imagen)           │ Descarga      │ ~50 MB          │
#   │ immich-app/postgres (imagen)       │ Descarga      │ ~150 MB         │
#   ├────────────────────────────────────┼───────────────┼─────────────────┤
#   │ TOTAL imágenes Docker              │ Descarga      │ ~2.1 GB         │
#   ├────────────────────────────────────┼───────────────┼─────────────────┤
#   │ Modelos ML (model-cache volume)    │ 1er arranque  │ ~1–2 GB         │
#   │ Base de datos PostgreSQL           │ Persistente   │ ~1–3 GB         │
#   │ Fotos/vídeos subidos (library)     │ Persistente   │según biblioteca │
#   │ Miniaturas y vídeo transcodificado │ Generado auto │+10–20% library  │
#   ├────────────────────────────────────┼───────────────┼─────────────────┤
#   │ TOTAL fijo del sistema (sin fotos) │               │ ~6–7 GB         │
#   └────────────────────────────────────┴───────────────┴─────────────────┘
#
#   Ejemplo real: 100 GB de fotos → ~120-125 GB totales en disco
#   (100 GB fotos + hasta 20 GB miniaturas + ~5 GB sistema fijo)
#
#   Recomendación de disco:
#     - Base de datos (DB_DATA_LOCATION): SSD local obligatorio.
#       La doc oficial advierte: "Nunca usar una ubicación compampartida en la red de ninguna clase."
#     - Biblioteca de fotos (UPLOAD_LOCATION): SSD preferible, HDD aceptable.
#
# ============================================================================
# CAMBIOS IMPORTANTES respecto a versiones anteriores
# ============================================================================
#
#   - Redis reemplazado por 'valkey/valkey:9' (fork open-source compatible).
#   - PostgreSQL cambió de 'pgvecto.rs' a 'vectorchord' — NO uses una imagen
#     genérica de Postgres, Immich requiere la suya propia con extensiones.
#   - IMMICH_VERSION='v2' en .env (no 'release') para mayor estabilidad.
#   - El compose ya NO usa 'version:' al inicio (obsoleto en Compose v2+).
#
# ============================================================================
# ARQUITECTURA DE SERVICIOS
# ============================================================================
#
#   ┌─────────────────────────────────────────────────────────────┐
#   │  Internet → NPM (proxy-network) → immich-server:2283        │
#   │                                                             │
#   │  Red interna 'immich-net' (comunicación entre servicios):   │
#   │    immich-server ←→ redis                                   │
#   │    immich-server ←→ database (postgres)                     │
#   │    immich-server ←→ immich-machine-learning                 │
#   │                                                             │
#   │  Solo immich-server está en proxy-network (panel web).      │
#   │  El resto de servicios son internos — inaccesibles desde    │
#   │  fuera ni desde NPM, solo desde immich-server.              │
#   └─────────────────────────────────────────────────────────────┘
#
# ============================================================================
# PRERREQUISITOS
# ============================================================================
#
#   1. Crear los directorios de datos antes de desplegar:
#        sudo mkdir -p /opt/stacks/immich/library
#        sudo mkdir -p /opt/stacks/immich/postgres
#
#   2. Tener el certificado wildcard *.mi-dominio.duckdns.org en NPM.
#
#   3. Crear el Proxy Host en NPM tras desplegar:
#        ===Details===
#        - Dominio  : fotos.mi-dominio.duckdns.org
#        - Scheme   : http
#        - Host     : immich-server
#        - Port     : 2283
#        - Cache Assets:          DESACTIVADO
#        - Block Common Exploits: ACTIVADO
#        - Websockets Support:    ACTIVADO (Obligatorio)
#        ===SSL===
#        - SSL Certificate : *.tu-dominio.duckdns.org (wildcard existente)
#        - Force SSL       : ACTIVADO
#        - HTTP/2 Support  : ACTIVADO (Crucial para el rendimiento)
#        - HSTS Enabled    : ACTIVADO
#        - HSTS Sub-domains: DESACTIVADO
#
#   4. El primer usuario en registrarse se convierte en administrador.
#      Accede a https://fotos.mi-dominio.duckdns.org y regístrate.
#
#   5. El primer arranque tarda 3-5 minutos: Immich descarga los modelos
#      de machine learning (~1-2 GB) automáticamente. Es normal.
#
# ============================================================================
# ADVERTENCIA DE LA DOCUMENTACIÓN OFICIAL
# ============================================================================
#
#   "Do not edit the volume lines marked with this comment."
#   Los paths internos de los volúmenes de Postgres y uploads son
#   gestionados por Immich — edita SOLO las variables en el .env.
#
# ============================================================================

name: immich

services:

  # --------------------------------------------------------------------------
  # immich-server: servicio principal — API, interfaz web y gestión de assets.
  # Es el único servicio expuesto a proxy-network para que NPM llegue al panel.
  # Puerto interno: 2283 (NO se expone al host, solo a través de NPM).
  # --------------------------------------------------------------------------
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    volumes:
      # Almacenamiento de fotos y vídeos subidos por los usuarios.
      # Para cambiar la ruta, edita UPLOAD_LOCATION en el .env,
      # NO edites esta línea directamente.
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      # Sincronización de zona horaria con el host.
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      # Red interna: comunicación con redis, postgres y machine-learning.
      immich-net:
      # Red compartida con NPM: permite que el proxy llegue al panel web.
      proxy-network:
    restart: always
    healthcheck:
      disable: false

  # --------------------------------------------------------------------------
  # immich-machine-learning: servicio de IA para reconocimiento facial,
  # búsqueda inteligente por objetos y generación de embeddings CLIP.
  # Solo accesible desde immich-server — NO conectado a proxy-network.
  #
  # ESTADO ACTUAL: DESHABILITADO para reducir consumo de RAM y disco.
  #
  # Para REACTIVAR:
  #   1. Descomenta todas las líneas de este bloque (quita el '#' inicial).
  #   2. En el .env, comenta o elimina: IMMICH_MACHINE_LEARNING_ENABLED=false
  #   3. Aplica los cambios: docker compose up -d
  #   4. El primer arranque descarga los modelos ML (~1-2 GB) — normal que
  #      tarde unos minutos. Los logs mostrarán descargas en curso.
  #
  # Funciones que se recuperan al reactivar:
  #   - Búsqueda inteligente por descripción (CLIP)
  #   - Reconocimiento y agrupación facial
  #   - Detección de objetos y escenas
  #   - Detección de duplicados
  # --------------------------------------------------------------------------
  # immich-machine-learning:
  #   container_name: immich_machine_learning
  #   image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
  #   volumes:
  #     # Caché de modelos ML (CLIP, detección facial, etc.)
  #     # Named volume para no re-descargarlos en cada recreación.
  #     - model-cache:/cache
  #   env_file:
  #     - .env
  #   networks:
  #     - immich-net
  #   restart: always
  #   healthcheck:
  #     disable: false

  # --------------------------------------------------------------------------
  # redis (Valkey): cola de jobs y caché de sesiones.
  # Nota: Immich usa la imagen 'valkey/valkey' desde versiones recientes
  # en lugar de 'redis'. Es un fork open-source compatible con la misma API.
  # Solo accesible desde immich-server — NO conectado a proxy-network.
  # --------------------------------------------------------------------------
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:8436e10bc65c94886a91d4415b6a6dfa9cb5a306fb3b996e5bb67cd2b4854193
    networks:
      - immich-net
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  # --------------------------------------------------------------------------
  # database: PostgreSQL 14 con extensión VectorChord para búsqueda vectorial.
  # IMPORTANTE: usar OBLIGATORIAMENTE la imagen oficial de Immich para Postgres.
  # Una imagen genérica de postgres NO incluye VectorChord y Immich fallará.
  # Solo accesible desde immich-server — NO conectado a proxy-network.
  # --------------------------------------------------------------------------
  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      # --data-checksums: detecta corrupción silenciosa de datos en disco.
      # Recomendado por la doc oficial para producción.
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # DB_STORAGE_TYPE: solo descomenta esta línea si usas HDD en lugar de SSD.
      # Con SSD se deja comentada (comportamiento por defecto, óptimo).
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Datos de PostgreSQL. Para cambiar la ruta, edita DB_DATA_LOCATION
      # en el .env — NO edites esta línea directamente.
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    # shm_size: memoria compartida para operaciones de Postgres.
    # 128mb es el valor recomendado por la doc oficial.
    shm_size: 128mb
    networks:
      - immich-net
    restart: always
    healthcheck:
      disable: false

# ============================================================================
# VOLÚMENES
# ============================================================================
volumes:
  # Caché de modelos de machine learning (facial recognition, CLIP, etc.)
  # Se declara aunque el servicio esté comentado para que al reactivarlo
  # los modelos ya descargados previamente se conserven sin re-descargar.
  model-cache:

# ============================================================================
# REDES
# ============================================================================
networks:

  # Red interna exclusiva de Immich: aísla los servicios de base de datos,
  # redis y machine-learning del resto del homelab. Ningún otro contenedor
  # externo puede acceder a estos servicios directamente.
  immich-net:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24

  # Red compartida con NPM y el resto de servicios del homelab.
  # Solo immich-server está conectado aquí para recibir tráfico del proxy.
  proxy-network:
    external: true
